<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Cormorant+Garamond:ital@1&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        nav {
            display: flex;
            gap: 20px;
            padding: 10px;
            background: #5c0d76;
        }
        nav a {
            text-decoration: none;
            cursor: pointer;
            color: #9b7cc0;
            font-size: 1.4rem;
        }
        #nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        h2, h3 {
            font-family: 'Cormorant Garamond', serif;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        body, p {
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.5;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('BookshopBackground.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
            z-index: -1;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
        }
        #logoutButton {
            background-color: transparent;
            color: #9b7cc0;
            border: 1px solid #9b7cc0;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 4px;
            font-family: 'Cormorant Garamond', serif;
        }
        #welcome-message {
            color: #9b7cc0;
            font-size: 1.4rem;
            font-family: 'Cormorant Garamond', serif;
        }
        #receipt-container {
            max-width: 700px;
            margin: 20px auto;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 20px;
        }
        .receipt-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        #receipt-total {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: right;
            margin-top: 10px;
            border-top: 1px solid #7a5a9e;
            padding-top: 10px;
        }
        #shipping-info {
            margin-top: 20px;
            font-size: 1.1rem;
            line-height: 1.8;
        }
        #confirmation-msg {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 20px;
            color: #5c0d76;
        }
        #home-btn {
            background-color: #5c0d76;
            color: #9b7cc0;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 4px;
            display: block;
            margin: 20px auto 0;
        }
    </style>
    <title>Order Receipt</title>
</head>
<body>
    <h1>The Quill and Quiver</h1>
    <nav id="nav">
        <a href="index.html">Home</a>
        <a href="cart.html">My Cart</a>
        <a href="browse.html">Browse Books</a>

        <div id="nav-right">
            <span id="login">
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            </span>
            <span id="welcome-message"></span>
            <button id="logoutButton">Logout</button>
        </div>
    </nav>
 
    <div id="receipt-container">
        <h1>Order Confirmed!</h1>
        <h2>Your Receipt</h2>
        <div id="receipt-items"></div>
        <div id="receipt-total"></div>
        <div id="shipping-info"></div>
        <p id="confirmation-msg"></p>
        <button id="home-btn" onclick="window.location.href='index.html'">Continue Shopping</button>
    </div>
 
    <script>
        function loadReceipt() {
            const data = JSON.parse(localStorage.getItem('receiptData'));
            if (!data) {
                window.location.href = 'index.html';
                return;
            }
 
            // Order items
            const itemsDiv = document.getElementById('receipt-items');
            data.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'receipt-item';
                div.innerHTML = `<span>${item.title} (x${item.quantity})</span>
                                 <span>$${(item.price * item.quantity).toFixed(2)}</span>`;
                itemsDiv.appendChild(div);
            });
 
            document.getElementById('receipt-total').textContent = `Total: $${data.total}`;
 
            // Shipping
            const s = data.shipping;
            document.getElementById('shipping-info').innerHTML = `
                <strong>Shipping to:</strong><br>
                ${s.name}<br>
                ${s.address}<br>
                ${s.city}, ${s.state} ${s.zip}
            `;
 
            document.getElementById('confirmation-msg').textContent =
                `A receipt has been sent to ${data.email}.`;
 
            // Clear receipt data now that it's displayed
            localStorage.removeItem('receiptData');
        }
 
        loadReceipt();
 
        // Logout functionality
        document.getElementById('logoutButton').addEventListener('click', async function()
        {
            await fetch("/api/logout");
            window.location.href = 'index.html'; // Redirect to home page after logout
        });

        // Is User Logged In?
        async function checkLoginStatus() {
    try {
        const response = await fetch('/api/user');
        const result = await response.json();
        if (result.loggedIn) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('logoutButton').style.display = 'block';
            document.getElementById('logoutButton').textContent = `Logout (${result.username})`;

            const welcome = document.createElement('span');
            welcome.id = 'welcome-message';
            welcome.textContent = `Welcome, ${result.username}!`;
            document.getElementById('nav-right').insertBefore(welcome, document.getElementById('logoutButton'));

            document.getElementById('logoutButton').addEventListener('click', async function() {
                await fetch("/api/logout");
                window.location.href = 'index.html';
            });
        } else {
            document.getElementById('logoutButton').style.display = 'none';
            document.getElementById('login').style.display = 'flex';
        }
    } catch (error) {
        console.error('Error checking login status:', error);
    }
}
        checkLoginStatus();
    </script>
</body>
</html>
