<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Cormorant+Garamond:ital@1&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        nav {
            display: flex;
            gap: 20px;
            padding: 10px;
            background: #5c0d76;
        }
        nav a {
            text-decoration: none;
            cursor: pointer;
            color: #9b7cc0;
            font-size: 1.4rem;
        }
        #nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        h2, h3 {
            font-family: 'Cormorant Garamond', serif;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        body, p {
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.5;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('BookshopBackground.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
            z-index: -1;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
        }
        #login {
            display: flex;
            gap: 20px;
            cursor: pointer;
        }
        #logoutButton {
            background-color: transparent;
            color: #9b7cc0;
            border: 1px solid #9b7cc0;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Cormorant Garamond', serif;
            border-radius: 4px;
        }
        #welcome-message {
            color: #9b7cc0;
            font-size: 1.4rem;
            font-family: 'Cormorant Garamond', serif;
        }
        #cart-container {
            max-width: 800px;
            margin: 20px auto;
            background-color: #9b7cc0;
            padding: 20px;
            border-radius: 8px;
        }
        .cart-item {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: center;
        }
        .cart-item img {
            width: 100px;
            height: auto;
            border: 1px solid #7a5a9e;
            border-radius: 4px;
        }
        .cart-item-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .remove-btn {
            font-family: 'Cormorant Garamond', serif;
            background-color: #7a5a9e;
            color: #9b7cc0;
            border: 1px solid #9b7cc0;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 4px;
        }
        .remove-btn:hover {
            background-color: #5c0d76;
            color: #9b7cc0;
        }
        #total {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: right;
            margin-top: 20px;
        }
        #checkout {
            font-family: 'Cormorant Garamond', serif;
            background-color: #7a5a9e;
            color: #9b7cc0;
            border: 1px solid #9b7cc0;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 4px;
            display: block;
            margin-left: auto;
        }
        #checkout:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
        #checkout:hover:not(:disabled) {
            background-color: #5c0d76;
            color: #9b7cc0;
        }

    </style>
    <title>Shopping Cart</title>
</head>
<body>
    <h1>The Quill and Quiver</h1>
    <nav id="nav">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse Books</a>

        <div id="nav-right">
            <span id="login">
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            </span>
            <span id="welcome-message"></span>
            <button id="logoutButton">Logout</button>
        </div>
    </nav>
    <div id="cart-container">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items"></div>
        <div id="total"></div>
        <button id="checkout" disabled>Proceed to Checkout</button>
    </div>
    <script>
        // Load Cart Items
        async function loadCart() {
            try {
                const response = await fetch('/api/cart');
                if (response.ok) {
                    const cartItems = await response.json();
                    const cartItemsDiv = document.getElementById('cart-items');
                    cartItemsDiv.innerHTML = '';
                    let totalPrice = 0;

                    if (cartItems.length === 0) {
                        document.getElementById('checkout').disabled = true;
                        cartItemsDiv.innerHTML = '<p>Your cart is empty. Start browsing for books!</p>';
                        document.getElementById('total').textContent = '';
                        localStorage.removeItem('pendingOrder');
                        return;
                    } 

                    cartItems.forEach(item => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'cart-item';

                        const img = document.createElement('img');
                        img.src = `/frontCovers/${item.front_cover}`;

                        const info = document.createElement('div');
                        info.className = 'cart-item-info';
                        info.innerHTML = `${item.title}<span>$${parseFloat(item.price).toFixed(2)} x ${item.quantity}</span>`;

                        const removeBtn = document.createElement('button');
                        removeBtn.textContent = 'Remove';
                        removeBtn.className = 'remove-btn';
                        removeBtn.addEventListener('click', async () => {
                            try {
                                const res = await fetch(`/api/cart/${item.book_id}`, { method: 'DELETE' });
                                if (res.ok) {
                                    loadCart();
                                } else if (res.status === 401) {
                                    alert('Please log in to modify your cart.');
                                    window.location.href = 'login.html';
                                } else {
                                    alert(await res.text());
                                }
                            } catch (err) {
                                console.error('Error removing item:', err);
                            }
                        });

                        itemDiv.appendChild(img);
                        itemDiv.appendChild(info);
                        itemDiv.appendChild(removeBtn);
                        cartItemsDiv.appendChild(itemDiv);

                        totalPrice += parseFloat(item.price) * item.quantity;
                    });

                    const orderData = {
                            items: cartItems,
                            total: totalPrice.toFixed(2)
                        };
                    localStorage.setItem('pendingOrder', JSON.stringify(orderData));

                    document.getElementById('total').textContent = `Total: $${totalPrice.toFixed(2)}`;
                    document.getElementById('checkout').disabled = false;

                } else if (response.status === 401) {
                    alert('Please log in to view your cart.');
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }

        loadCart();

        document.getElementById('checkout').addEventListener('click', function() {
            const total = document.getElementById('total').textContent.replace('Total: $', '');
            if (parseFloat(total) <= 0) {
                alert("Your cart is empty!");
                return;
            }
            window.location.href = 'payment.html';
        });

    // Logout functionality
        document.getElementById('logoutButton').addEventListener('click', async function()
        {
            await fetch("/api/logout");
            window.location.href = 'index.html'; // Redirect to home page after logout
        });

        // Is User Logged In?
        async function checkLoginStatus() {
    try {
        const response = await fetch('/api/user');
        const result = await response.json();
        if (result.loggedIn) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('logoutButton').style.display = 'block';
            document.getElementById('logoutButton').textContent = `Logout (${result.username})`;

            const welcome = document.createElement('span');
            welcome.id = 'welcome-message';
            welcome.textContent = `Welcome, ${result.username}!`;
            document.getElementById('nav-right').insertBefore(welcome, document.getElementById('logoutButton'));

            document.getElementById('logoutButton').addEventListener('click', async function() {
                await fetch("/api/logout");
                window.location.href = 'index.html';
            });
        } else {
            document.getElementById('logoutButton').style.display = 'none';
            document.getElementById('login').style.display = 'flex';
        }
    } catch (error) {
        console.error('Error checking login status:', error);
    }
}
        checkLoginStatus();
    </script>
    
</body>
</html>
