<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Cormorant+Garamond:ital@1&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        nav {
            display: flex;
            gap: 20px;
            padding: 10px;
            background: #5c0d76;
        }
        nav a {
            text-decoration: none;
            cursor: pointer;
            color: #9b7cc0;
            font-size: 1.4rem;
        }
        #nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        h2, h3 {
            font-family: 'Cormorant Garamond', serif;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        body, p {
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.5;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('BookshopBackground.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
            z-index: -1;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
        }
        #login {
            display: flex;
            gap: 20px;
            cursor: pointer;
        }
        #logoutButton {
            background-color: transparent;
            color: #9b7cc0;
            border: 1px solid #9b7cc0;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 4px;
            font-family: 'Cormorant Garamond', serif;
        }
        #welcome-message {
            color: #9b7cc0;
            font-size: 1.4rem;
            font-family: 'Cormorant Garamond', serif;
        }
        .book-details-container {
            max-width: 800px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .book-details-container h2 {
            width: 100%;
            margin-top: 60px;
        }
        .book-images {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        #add-to-cart {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: bold;
            background-color: #9b7cc0;
            border: 2px solid #7a5a9e;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #add-to-cart:hover {
            background-color: #7a5a9e;
            transform: scale(1.05);
        }
        #front, #back {
            width: 200px;
            height: 300px;
            display: inline-block;
            margin-right: 10px;
        }
        #reviews {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            margin-top: 20px;
        }
        #reviews div {
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            width: 250px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }
        #reviews small {
            color: #1a1a1a;
        }
        #review-text {
            display: block;
            margin-top: 10px;
            width: 100%;
            max-width: 400px;
        }
        #review-text {
            height: 100px;
        }
        .star-rating {
            display: flex;
            flex-direction: row;
            gap: 5px;
        }

        .star-rating span {
            font-size: 2rem;
            color: #9b7cc0;
            cursor: pointer;
        }

        .star-rating span:hover {
            color: #f5c518;
        }
        .star-selected {
            color: #f5c518 !important;
        }
        #submit-review {
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #9b7cc0;
            border: none;
            border-radius:5px;
            cursor: pointer;
        }
        #submit-review:hover {
            background-color: #7a5a9e;
        }
        body{
            padding-bottom: 50px;
        }
    </style>
    <title>Book Details</title>
</head>
<body>
    <h1>The Quill and Quiver</h1>
    <nav id="nav">
        <a href="index.html">Home</a>
        <a href="cart.html">My Cart</a>
        <a href="browse.html">Browse Books</a>

        <div id="nav-right">
            <span id="login">
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            </span>
            <span id="welcome-message"></span>
            <button id="logoutButton">Logout</button>
        </div>
    </nav>
<div class="book-details-container">
    <h1 id="title"></h1>
    <div class="book-images">
        <img id="front">
        <img id="back">
    </div>
    <p id="price"></p>
    <p id="summary"></p>

    <button id="add-to-cart">Add to Cart</button>

    <h2>Reviews</h2>
    <div id="reviews"></div>

    <h3>Add Review</h3>
    <div class="star-rating" id="star-rating" style="justify-content: center;">
        <span data-value="1">★</span>
        <span data-value="2">★</span>
        <span data-value="3">★</span>
        <span data-value="4">★</span>
        <span data-value="5">★</span>
    </div>
    <input type="hidden" id="rating" value="5">
    <textarea id="review-text" style="margin: 10px auto;"></textarea>
    <button id="submit-review" style="display: block; margin: 0 auto;">Submit Review</button>
</div>
<script>

const params = new URLSearchParams(window.location.search);
const bookId = params.get('id');

// If no book Id provided (book clicked from browse page), alert user and do not attempt to load book details or reviews
if (bookId) {
    loadBook();
    loadReviews();
} else {
    alert('No book ID provided.');
}
// Load Book Details
    async function loadBook() {
        const res = await fetch(`/api/books/${bookId}`);
        const book = await res.json();

        document.getElementById('title').textContent = book.title;
        document.getElementById('price').textContent = `Price: $${book.price}`;
        document.getElementById('summary').textContent = book.summary;

        document.getElementById('front').src = `/frontCovers/${book.front_cover}`;
        document.getElementById('back').src = `/backCovers/${book.back_cover}`;

        // Add to Cart functionality
        document.getElementById('add-to-cart').addEventListener('click', async () => {
            const quantity = parseInt(prompt('How many copies would you like to add?'));
            if (isNaN(quantity) || quantity <= 0) {
                alert('Please enter a valid quantity.');
                return;
            }
            try {
                const response = await fetch('/api/cart', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ book_id: book.book_id, quantity })
                });
                if (response.ok) {
                    alert(`Added ${quantity} copies of "${book.title}" to cart!`);
                } else if (response.status === 401) {
                    alert('Please log in to add books to your cart.');
                    window.location.href = 'login.html'; // Redirect to login page
                }
                else {
                    const errorText = await response.text();
                    alert(errorText);
                }
            } catch (error) {
                console.error('Error adding book to cart:', error);
                alert('An error occurred while adding the book to cart.');
            }
        });
    }
// Load Reviews
    async function loadReviews() {
        const res = await fetch(`/api/books/${bookId}/reviews`);
        const reviews = await res.json();
        const reviewsDiv = document.getElementById('reviews');
        reviewsDiv.innerHTML = '';

        reviews.forEach(review => {
            const reviewDiv = document.createElement('div');
            const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
            reviewDiv.innerHTML = `<p><strong>${review.username}</strong></p><p style="color: #f5c518; font-size: 1.2rem;">${stars}</p><p>${review.review_text}</p><small>${new Date(review.review_date).toLocaleDateString()}</small>`;
            reviewsDiv.appendChild(reviewDiv);
        });
    }

    // Submit Review
document.getElementById('submit-review').addEventListener('click', async () => {
    const rating = document.getElementById('rating').value;
    const reviewText = document.getElementById('review-text').value;

    try {
        const response = await fetch(`/api/books/${bookId}/reviews`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ rating, review_text: reviewText })
        });
        if (response.ok) {
            alert('Review submitted!');
            loadReviews();
        } else if (response.status === 401) {
            alert('Please log in to submit a review.');
            window.location.href = 'login.html'; // Redirect to login page
        }
        else {
            const errorText = await response.text();
            alert(errorText);
        }
    } catch (error) {
        console.error('Error submitting review:', error);
        alert('An error occurred while submitting your review.');
    }
});

// Star rating functionality
let selectedRating = 5;
document.getElementById('star-rating').addEventListener('click', (e) => {
    if (e.target.tagName === 'SPAN') {
        selectedRating = parseInt(e.target.dataset.value);
        document.getElementById('rating').value = selectedRating;

        document.querySelectorAll('.star-rating span').forEach(star => {
            star.classList.remove('star-selected');
            if (parseInt(star.dataset.value) <= selectedRating) {
                star.classList.add('star-selected');
            }
        });
    }
});

// Logout functionality
        document.getElementById('logoutButton').addEventListener('click', async function()
        {
            await fetch("/api/logout");
            window.location.href = 'index.html'; // Redirect to home page after logout
        });

        // Is User Logged In?
        async function checkLoginStatus() {
    try {
        const response = await fetch('/api/user');
        const result = await response.json();
        if (result.loggedIn) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('logoutButton').style.display = 'block';
            document.getElementById('logoutButton').textContent = `Logout (${result.username})`;

            const welcome = document.createElement('span');
            welcome.id = 'welcome-message';
            welcome.textContent = `Welcome, ${result.username}!`;
            document.getElementById('nav-right').insertBefore(welcome, document.getElementById('logoutButton'));

            document.getElementById('logoutButton').addEventListener('click', async function() {
                await fetch("/api/logout");
                window.location.href = 'index.html';
            });
        } else {
            document.getElementById('logoutButton').style.display = 'none';
            document.getElementById('login').style.display = 'flex';
        }
    } catch (error) {
        console.error('Error checking login status:', error);
    }
}
        checkLoginStatus();          
</script>
</body>
