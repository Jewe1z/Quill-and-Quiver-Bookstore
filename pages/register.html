<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Cormorant+Garamond:ital@1&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        nav {
            display: flex;
            gap: 20px;
            padding: 10px;
            background: #5c0d76;
        }
        nav a {
            text-decoration: none;
            cursor: pointer;
            color: #9b7cc0;
            font-size: 1.4rem;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        h2, h3 {
            font-family: 'Cormorant Garamond', serif;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        body, p {
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.5;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('BookshopBackground.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
            z-index: -1;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
        }
        .register-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        form {
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #7a5a9e;
            border-radius: 4px;
            margin: 10px 0;
            font-family: 'Cormorant Garamond', serif;
        }
        label {
            font-weight: bold;
            font-family: 'Cormorant Garamond', serif;
        }
        button {
            background-color: #7a5a9e;
            padding: 15px 30px;
            border: 1px solid #7a5a9e;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cormorant Garamond', serif;
            margin: 10px auto 0;
            width: fit-content;
        }
        button:hover {
            background-color: #5c0d76;
        }
        .login-link {
            display: block;
            margin-top: 15px;
            padding: 10px;
            text-align: center;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            width: 100%;
            max-width: 250px;
            text-decoration: none;
            color: inherit;
        }
        .login-link:hover {
            text-decoration: none;
            background-color: #7a5a9e;
            cursor: pointer;
        }
            
</style>
    <title>Create Account</title>
</head>
<body>
    <h1>The Quill and Quiver</h1>
    <nav id="nav">
        <a href="cart.html">Shopping Cart</a>
        <a href="index.html">Home</a>
        <a href="browse.html">Browse Books</a>
    </nav>
    <h2>Create an Account</h2>
    <div class="register-container">
        <form id="registerForm">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br><br>

            <button type="submit">Register</button>
        </form>
    
        <a href="login.html" class="login-link">Already have an account? Login Here</a>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 

            // Collect form data
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Create data object for server
            const data = {
                username: username,
                email: email,
                password: password
            };

            // Send the data
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Account created successfully!');
                    window.location.href = 'login.html'; // Redirect to login page
                } else {
                    const errorText = await response.text();
                    alert('Error creating account: ' + errorText);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred while creating the account.');
            }
        });
    </script>
</body>
</html>
