<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Cormorant+Garamond:ital@1&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        nav {
            display: flex;
            gap: 20px;
            padding: 10px;
            background: #5c0d76;
        }
        nav a {
            text-decoration: none;
            cursor: pointer;
            color: #9b7cc0;
            font-size: 1.4rem;
        }
        #nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        #book1, #book2, #book3 {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center; 
            margin: 20px 0;
            width: 300px;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
        }
        #book1 h3, #book2 h3, #book3 h3 {
            font-size: 1.2rem;
            background-color: transparent;
            border: none;
            margin: 0 0 10px 0;
            padding: 0;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        h2, h3 {
            font-family: 'Cormorant Garamond', serif;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        body, p {
            font-family: 'Cormorant Garamond', serif;
            line-height: 1.5;
            background-color: #9b7cc0;
            border: 1px solid #7a5a9e;
            border-radius: 8px;
            padding: 15px;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('BookshopBackground.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
            z-index: -1;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
        }
        #login {
            display: flex;
            gap: 20px;
            cursor: pointer;
        }
        #logoutButton {
            background-color: transparent;
            color: #9b7cc0;
            border: 1px solid #9b7cc0;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 4px;
            font-family: 'Cormorant Garamond', serif;
        }
        #welcome-message {
            color: #9b7cc0;
            font-size: 1.4rem;
            font-family: 'Cormorant Garamond', serif;
        }
        .featured-books {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 40px;
            padding: 20px;
        }
    </style>
    <title>Home Page</title>
</head>
<body>
    <h1>The Quill and Quiver</h1>
    <nav id="nav">
        <a href="browse.html">Browse Books</a>
        <a href="cart.html">My Cart</a>

        <div id="nav-right">
            <span id="login">
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            </span>
            <span id="welcome-message"></span>
            <button id="logoutButton">Logout</button>
        </div>
    </nav>
    <h2>Featured Books</h2>
    <div class="featured-books">
        <div id="book1"></div>
        <div id="book2"></div>
        <div id="book3"></div>
    </div>
    <script>
        // Fetch and display featured books
        async function fetchFeaturedBooks() {
            const response = await fetch('/api/featured-books');
            const books = await response.json();

            document.getElementById('book1').innerHTML = 
            `<h3>${books[0].title}</h3> <img src="/frontCovers/${books[0].front_cover}" alt="${books[0].title} cover" width="100">`;
            document.getElementById('book2').innerHTML = 
            `<h3>${books[1].title}</h3> <img src="/frontCovers/${books[1].front_cover}" alt="${books[1].title} cover" width="100">`;
            document.getElementById('book3').innerHTML = 
            `<h3>${books[2].title}</h3> <img src="/frontCovers/${books[2].front_cover}" alt="${books[2].title} cover" width="100">`;
        }
        fetchFeaturedBooks();

        // Logout functionality
        document.getElementById('logoutButton').addEventListener('click', async function()
        {
            await fetch("/api/logout");
            window.location.href = 'index.html'; // Redirect to home page after logout
        });

        // Is User Logged In?
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/user');
                const result = await response.json();
                if (result.loggedIn) {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('logoutButton').style.display = 'block';
                    document.getElementById('logoutButton').textContent = `Logout (${result.username})`;

                    const welcome = document.createElement('span');
            welcome.id = 'welcome-message';
            welcome.textContent = `Welcome, ${result.username}!`;
            document.getElementById('nav-right').insertBefore(welcome, document.getElementById('logoutButton'));

                    document.getElementById('logoutButton').addEventListener('click', async function() {
                        await fetch("/api/logout");
                        window.location.href = 'index.html';
                    });
                } else {
                    document.getElementById('logoutButton').style.display = 'none';
                    document.getElementById('login').style.display = 'flex';
                }
            } catch (error) {
                console.error('Error checking login status:', error);
            }
        }
        checkLoginStatus();

    </script>
</body>
</html>
